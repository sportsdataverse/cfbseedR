      aria-label: GitHub
      href: https://github.com/sportsdataverse/cfbseedR/

reference:
- title: Standings & seeding
  desc: Compute standings, conference ranks and champions, and CFP seeds.
  contents:
  - cfb_standings
  - cfb_playoff_seeds
- title: Season simulation
  desc: Simulate seasons week by week with a pluggable results generator.
  contents:
  - cfb_simulations
  - cfbseedR_compute_results
  - simulations_verify_fct
- title: Data preparation
  desc: Map real schedules into the engine games schema.
  contents:
  - cfb_games_from_schedule

articles:
- title: Guides
  navbar: ~
