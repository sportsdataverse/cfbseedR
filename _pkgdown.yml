url: https://cfbseedR.sportsdataverse.org/

# llms.txt generation needs pandoc >= 3; keep builds reproducible across
# environments that ship older pandoc.
llm-docs: false

template:
  bootstrap: 5
  light-switch: true
  bootswatch: cosmo
  includes:
    in_header: |
      <script defer data-domain="cfbseedr.sportsdataverse.org" src="https://plausible.io/js/plausible.js"></script>
  # Palette sampled from the hex logo: navy #0D1B2A field, gold #FFB612
  # border/diamond, cyan #A9D6E5 bracket leaves, slate #41566B connectors.
  # Bootstrap 5.3 color-modes derive dark mode from these vars automatically;
  # the light/dark split (navy-as-navbar vs navy-as-page-bg, gold vs cyan
  # link-hover) is finished with `[data-bs-theme]`-scoped CSS custom
  # properties in pkgdown/extra.css, since bslib's `template.bslib` block is
  # a single theme, not a light/dark pair.
  bslib:
    bg: "#FFFFFF"
    fg: "#0D1B2A"
    primary: "#0D1B2A"
    secondary: "#41566B"
    success: "#FFB612"
    link-color: "#B8860B"
    link-hover-color: "#B8860B"
    code-color: "#41566B"
    border-color: "#41566B"
    navbar-light-bg: "#0D1B2A"
    navbar-light-color: "#E8EEF2"
    navbar-light-hover-color: "#FFB612"
    navbar-light-active-color: "#FFB612"
    navbar-light-brand-color: "#FFFFFF"
    navbar-light-brand-hover-color: "#FFB612"
    navbar-dark-bg: "#0D1B2A"
    navbar-dark-color: "#E8EEF2"
    navbar-dark-hover-color: "#A9D6E5"
    navbar-dark-active-color: "#FFB612"
    nav-link-hover-color: "#FFB612"
    nav-link-focus-color: "#FFB612"
    nav-link-dropdown-toggle-hover-color: "#FFB612"
    navbar-hover-color: "#FFB612"
    navbar-brand-hover-color: "#FFB612"
    nav-tabs-link-active-bg: "#FFB612"
    nav-pills-link-active-color: "#B8860B"
    btn-link-color: "#B8860B"
    btn-link-hover-color: "#FFB612"
    dropdown-link-color: "#B8860B"
    input-btn-focus-color: "#FFB612"
    dropdown-dark-link-hover-bg: "#FFB612"
    border-radius: 0.5rem
    btn-border-radius: 0.25rem
  opengraph:
    image:
      src: "https://raw.githubusercontent.com/sportsdataverse/cfbseedR/main/man/figures/logo.png"
      alt: "cfbseedR social preview card"
    twitter:
      creator: "@saiemgilani"
      site: "@cfbfastR"
      card: summary

authors:
  Saiem Gilani:
    href: https://x.com/saiemgilani
  Sebastian Carl:
    href: https://x.com/mrcaseb
  Lee Sharpe:
    href: https://x.com/LeeSharpeNFL

home:
  title: cfbseedR • Simulate College Football Seasons
  description: >
    Functions to efficiently simulate and evaluate college football seasons,
    including conference standings, championships, and College Football
    Playoff seeding. Adapted from nflseedR.
  icon: fa-home
  href: index.html

